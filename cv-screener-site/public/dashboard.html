<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Dashboard — GradScreen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EFF1FA; --card:#FFFFFF; --ink:#211F3D; --ink-soft:#5B577B; --line:#E1DEF3;
    --accent:#FFB648; --accent-ink:#7A4B00; --deep:#5B4FE8;
    --pass:#2E9E6B; --mid:#E0932E; --low:#E15B5B;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .bg-pattern{
    position:fixed;inset:0;width:100%;height:100%;
    z-index:0;pointer-events:none;
    color:var(--deep);fill:currentColor;stroke:currentColor;
    opacity:0.1;
  }
  /* ARTWORK SWAP POINT — see public/index.html for the full instructions.
     Uncomment and point at your licensed image once you have one. */
  /*
  .bg-photo{
    position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;
    background-image:url('images/campus.jpg');
    background-size:cover;background-position:center;
  }
  .bg-photo::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(239,241,250,0.92) 0%, rgba(239,241,250,0.85) 100%);
  }
  */
  .wrap{max-width:980px;margin:0 auto;padding:40px 24px 90px;position:relative;z-index:1;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px;flex-wrap:wrap;gap:10px;}
  h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:28px;margin:0;}
  .meta{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);}

  #loginPanel{max-width:360px;margin:100px auto;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:32px;box-shadow:0 20px 50px -30px rgba(33,31,61,0.35);position:relative;z-index:1;}
  #loginPanel h2{font-family:'Instrument Serif',serif;font-size:22px;margin:0 0 16px;font-weight:400;}
  #loginPanel input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;font-size:14.5px;margin-bottom:14px;background:#FBFBFE;}
  #loginPanel input:focus{outline:none;border-color:var(--deep);background:#fff;}
  #loginPanel button{width:100%;background:var(--accent);color:var(--accent-ink);border:none;border-radius:999px;padding:13px;font-weight:700;cursor:pointer;box-shadow:0 12px 24px -10px rgba(255,182,72,0.7);}
  #loginPanel .err{color:var(--low);font-size:13px;margin-top:10px;display:none;}

  .logout{background:#fff;border:1.5px solid var(--line);border-radius:999px;padding:7px 16px;font-size:12.5px;cursor:pointer;color:var(--ink-soft);font-weight:600;}

  .cards{display:flex;flex-direction:column;gap:14px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 22px;display:grid;grid-template-columns:52px 1fr auto;gap:18px;align-items:start;box-shadow:0 12px 30px -24px rgba(33,31,61,0.4);}
  @media (max-width:600px){.card{grid-template-columns:44px 1fr;}}
  .stamp{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:15px;background:#F3F2FC;border:2.5px solid var(--deep);color:var(--deep);}
  .stamp.pass{border-color:var(--pass);color:var(--pass);}
  .stamp.mid{border-color:var(--mid);color:var(--mid);}
  .stamp.low{border-color:var(--low);color:var(--low);}
  .cbody .name{font-family:'Instrument Serif',serif;font-size:18px;font-weight:400;margin:0 0 3px;}
  .cbody .contact{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);margin-bottom:6px;}
  .cbody .target{font-size:12.5px;color:var(--deep);margin-bottom:6px;font-weight:500;}
  .cbody .summary{font-size:13px;line-height:1.5;margin-bottom:8px;display:none;color:var(--ink);}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;display:none;}
  .tag{font-family:'JetBrains Mono',monospace;font-size:10.5px;background:#F3F2FC;border:1px solid var(--line);border-radius:999px;padding:3px 10px;color:var(--deep);}
  .sw{display:none;grid-template-columns:1fr 1fr;gap:14px;font-size:12px;margin-top:8px;}
  .sw h4{font-family:'JetBrains Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 4px;color:var(--ink-soft);}
  .sw ul{margin:0;padding-left:15px;line-height:1.5;}
  .sw.strengths h4{color:var(--pass);}
  .sw.gaps h4{color:var(--low);}
  .card.open .summary, .card.open .tags, .card.open .sw{display:block;}
  .card.open .sw{display:grid;}
  .actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
  .toggle, .delete{background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;font-size:12px;color:var(--deep);padding:0;}
  .delete{color:var(--low);}
  .empty{border:1.5px dashed var(--line);border-radius:16px;padding:50px;text-align:center;color:var(--ink-soft);font-size:13.5px;background:var(--card);}
</style>
</head>
<body>
<!-- ARTWORK SWAP POINT: see public/index.html and README.md -->
<svg class="bg-pattern" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <symbol id="icon-cap" viewBox="0 0 40 40">
      <path d="M2 14 L20 6 L38 14 L20 22 Z"/>
      <path d="M20 22 L20 30" stroke-width="1.8" fill="none"/>
      <circle cx="20" cy="31.5" r="1.8"/>
      <path d="M9 16.3 L9 25 Q20 30 31 25 L31 16.3" fill="none" stroke-width="1.8"/>
    </symbol>
    <symbol id="icon-book" viewBox="0 0 40 40">
      <path d="M4 8 Q12 4 19 8 L19 30 Q12 26 4 30 Z"/>
      <path d="M36 8 Q28 4 21 8 L21 30 Q28 26 36 30 Z"/>
    </symbol>
    <symbol id="icon-scroll" viewBox="0 0 40 40">
      <rect x="6" y="12" width="28" height="16" rx="8"/>
      <line x1="6" y1="12" x2="6" y2="28" stroke-width="2"/>
      <line x1="34" y1="12" x2="34" y2="28" stroke-width="2"/>
    </symbol>
    <pattern id="uniPattern" width="280" height="280" patternUnits="userSpaceOnUse">
      <use href="#icon-cap" x="10" y="10" width="52" height="52"/>
      <use href="#icon-book" x="150" y="40" width="46" height="46" transform="rotate(-10 173 63)"/>
      <use href="#icon-scroll" x="60" y="150" width="48" height="48" transform="rotate(6 84 174)"/>
      <use href="#icon-cap" x="200" y="190" width="38" height="38" transform="rotate(14 219 209)"/>
      <use href="#icon-book" x="-10" y="200" width="40" height="40" transform="rotate(8 10 220)"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#uniPattern)"/>
</svg>

<div class="wrap">

  <div id="loginPanel">
    <h2>Staff login</h2>
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Log in</button>
    <div class="err" id="loginErr">Incorrect password</div>
  </div>

  <div id="dashboard" style="display:none;">
    <header>
      <h1>Enquiries</h1>
      <div style="display:flex;align-items:center;gap:14px;">
        <span class="meta" id="countMeta"></span>
        <button class="logout" id="logoutBtn">Log out</button>
      </div>
    </header>
    <div id="cardsArea"></div>
  </div>

</div>

<script>
const loginPanel = document.getElementById('loginPanel');
const dashboard = document.getElementById('dashboard');
const passwordInput = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const loginErr = document.getElementById('loginErr');
const logoutBtn = document.getElementById('logoutBtn');
const cardsArea = document.getElementById('cardsArea');
const countMeta = document.getElementById('countMeta');

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function scoreBand(score){
  if(score >= 70) return 'pass';
  if(score >= 45) return 'mid';
  return 'low';
}

async function checkSession(){
  const res = await fetch('/api/staff/session');
  const data = await res.json();
  if(data.authenticated){
    showDashboard();
  }
}

loginBtn.addEventListener('click', doLogin);
passwordInput.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });

async function doLogin(){
  loginErr.style.display = 'none';
  const res = await fetch('/api/staff/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ password: passwordInput.value })
  });
  if(res.ok){
    showDashboard();
  } else {
    loginErr.style.display = 'block';
  }
}

logoutBtn.addEventListener('click', async () => {
  await fetch('/api/staff/logout', { method: 'POST' });
  loginPanel.style.display = 'block';
  dashboard.style.display = 'none';
  passwordInput.value = '';
});

async function showDashboard(){
  loginPanel.style.display = 'none';
  dashboard.style.display = 'block';
  await loadSubmissions();
}

async function loadSubmissions(){
  const res = await fetch('/api/staff/submissions');
  if(!res.ok){ return; }
  const data = await res.json();
  countMeta.textContent = `${data.length} submission${data.length===1?'':'s'}`;
  if(data.length === 0){
    cardsArea.innerHTML = '<div class="empty">No submissions yet.</div>';
    return;
  }
  const container = document.createElement('div');
  container.className = 'cards';
  data.forEach((sub, i) => {
    const d = sub.analysis || {};
    const band = scoreBand(d.score || 0);
    const skillTags = (d.skills||[]).map(s => `<span class="tag">${escapeHtml(s)}</span>`).join('');
    const strengths = (d.strengths||[]).map(s => `<li>${escapeHtml(s)}</li>`).join('') || '<li>—</li>';
    const gaps = (d.gaps||[]).map(s => `<li>${escapeHtml(s)}</li>`).join('') || '<li>—</li>';
    const date = new Date(sub.submittedAt).toLocaleString();

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="stamp ${band}">${d.score ?? '—'}</div>
      <div class="cbody">
        <p class="name">${escapeHtml(sub.studentName)}</p>
        <div class="contact">${escapeHtml(sub.studentEmail)}${sub.phone ? ' · ' + escapeHtml(sub.phone) : ''} · ${escapeHtml(date)} · ${escapeHtml(sub.fileName || '')}</div>
        ${sub.target ? `<div class="target">Interested in: ${escapeHtml(sub.target)}</div>` : ''}
        ${sub.referral ? `<div class="target" style="color:var(--ink-soft);font-weight:400;">Source: ${escapeHtml(sub.referral)}</div>` : ''}
        ${sub.message ? `<p class="summary" style="display:block;"><strong>Message:</strong> ${escapeHtml(sub.message)}</p>` : ''}
        <p class="summary">${escapeHtml(d.summary || '')}</p>
        <div class="tags">${skillTags}</div>
        <div class="sw">
          <div class="strengths"><h4>Strengths</h4><ul>${strengths}</ul></div>
          <div class="gaps"><h4>Gaps</h4><ul>${gaps}</ul></div>
        </div>
      </div>
      <div class="actions">
        <button class="toggle">Details</button>
        <button class="delete">Delete</button>
      </div>
    `;
    card.querySelector('.toggle').addEventListener('click', () => {
      card.classList.toggle('open');
      card.querySelector('.toggle').textContent = card.classList.contains('open') ? 'Hide' : 'Details';
    });
    card.querySelector('.delete').addEventListener('click', async () => {
      if(!confirm(`Delete ${sub.studentName}'s submission? This can't be undone.`)) return;
      await fetch(`/api/staff/submissions/${sub.id}`, { method: 'DELETE' });
      loadSubmissions();
    });
    container.appendChild(card);
  });
  cardsArea.innerHTML = '';
  cardsArea.appendChild(container);
}

checkSession();
</script>
</body>
</html>
